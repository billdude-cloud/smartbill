<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Forgot Password - SmartBill</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="apple-touch-icon" href="logo.svg">
    <script src="js/api.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/currency.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .forgot-container {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
        }

        .forgot-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid var(--border-color);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo i {
            font-size: 40px;
            color: #667eea;
        }

        .logo span {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: var(--muted-text);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.3s;
            -webkit-appearance: none;
            background: var(--card-bg);
            color: var(--text-color);
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .reset-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }

        .reset-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: var(--danger-100);
            border-left: 4px solid var(--danger-500);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: var(--danger-700);
            display: none;
            font-size: 14px;
            align-items: center;
            gap: 10px;
        }

        .error-message.show {
            display: flex;
        }

        .error-message i {
            font-size: 18px;
        }

        .success-message {
            background: var(--success-100);
            border-left: 4px solid var(--success-500);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            color: var(--success-700);
            display: none;
            align-items: flex-start;
            gap: 12px;
        }

        .success-message.show {
            display: flex;
        }

        .success-message i {
            font-size: 20px;
            margin-top: 2px;
        }

        .success-message strong {
            display: block;
            margin-bottom: 4px;
        }

        .success-message p {
            margin: 0;
            font-size: 13px;
            color: var(--success-600);
        }

        .info-text {
            background: var(--primary-50);
            border-radius: 12px;
            padding: 14px 16px;
            margin: 20px 0;
            font-size: 0.85rem;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--primary-200);
        }

        .info-text i {
            color: #667eea;
            font-size: 18px;
        }

        .back-to-login {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .back-to-login a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: gap 0.3s;
        }

        .back-to-login a:hover {
            gap: 10px;
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideInRight 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .toast-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .toast-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .toast-info {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Dark mode adjustments */
        body.dark-mode .forgot-card {
            background: var(--card-bg);
        }

        @media (max-width: 480px) {
            .forgot-card {
                padding: 32px 24px;
            }

            .logo i {
                font-size: 32px;
            }

            .logo span {
                font-size: 24px;
            }

            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="particles"></div>

    <!-- Toast Message Container -->
    <div id="toastMessage" class="toast-message" style="display: none;"></div>

    <div class="forgot-container">
        <div class="forgot-card">
            <div class="logo">
                <a href="index.html">
                    <i class="fas fa-receipt"></i>
                    <span>SmartBill</span>
                </a>
            </div>

            <h2>Forgot Password?</h2>
            <p class="subtitle">No worries, we'll send you reset instructions</p>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Error message</span>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="success-message">
                <i class="fas fa-check-circle"></i>
                <div>
                    <strong>Check your email!</strong>
                    <p>We've sent password reset instructions to your email address.</p>
                </div>
            </div>

            <!-- Info Box -->
            <div class="info-text">
                <i class="fas fa-info-circle"></i>
                <span>Enter your email address and we'll send you a link to reset your password.</span>
            </div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your registered email" required autocomplete="email">
                    </div>
                </div>

                <button type="submit" class="reset-btn" id="resetBtn">
                    <i class="fas fa-paper-plane"></i>
                    <span>Send Reset Instructions</span>
                </button>
            </form>

            <div class="back-to-login">
                <a href="login.html">
                    <i class="fas fa-arrow-left"></i>
                    Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // API CONFIGURATION
        // ============================================
        const PAGE_API_BASE = typeof API_BASE !== 'undefined'
            ? API_BASE
            : (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000/api'
            : '/api');
        
        console.log('🔧 PAGE_API_BASE:', PAGE_API_BASE);

        // ============================================
        // CREATE BACKGROUND PARTICLES
        // ============================================
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 25;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 50 + 15;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 20}s`;
                particle.style.animationDuration = `${Math.random() * 15 + 10}s`;
                particle.style.opacity = Math.random() * 0.3;
                container.appendChild(particle);
            }
        }
        createParticles();

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.className = `toast-message toast-${type}`;
            toast.style.display = 'block';
            
            if (type === 'success' && typeof showConfetti === 'function') {
                setTimeout(() => showConfetti(500, 25), 100);
            }
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // ============================================
        // FORM SUBMISSION
        // ============================================
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const resetBtn = document.getElementById('resetBtn');
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successDiv = document.getElementById('successMessage');
            const originalBtnText = resetBtn.innerHTML;
            
            // Hide any previous messages
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            
            // Validate email
            if (!email) {
                errorText.textContent = 'Please enter your email address';
                errorDiv.classList.add('show');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorText.textContent = 'Please enter a valid email address';
                errorDiv.classList.add('show');
                return;
            }
            
            // Show loading state
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="spinner"></span> Sending...';
            
            try {
                console.log('📡 Sending password reset request to:', `${PAGE_API_BASE}/forgot-password`);
                
                const response = await fetch(`${PAGE_API_BASE}/forgot-password`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                console.log('📥 Response:', { status: response.status, data });

                // The endpoint always returns 200 for security reasons
                if (response.ok) {
                    successDiv.classList.add('show');
                    document.getElementById('email').value = '';
                    showToast(data.message || 'Reset instructions sent!', 'success');
                    
                    // Auto redirect after 5 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 5000);
                } else {
                    throw new Error(data.error || 'Failed to send reset instructions');
                }
                
            } catch (error) {
                console.error('❌ Error:', error);
                errorText.textContent = error.message || 'An error occurred. Please try again.';
                errorDiv.classList.add('show');
                showToast('Failed to send reset email', 'error');
            } finally {
                // Reset button state
                resetBtn.disabled = false;
                resetBtn.innerHTML = originalBtnText;
            }
        });

        // Hide error when typing
        document.getElementById('email').addEventListener('input', function() {
            document.getElementById('errorMessage').classList.remove('show');
        });

        // ============================================
        // CHECK IF ALREADY LOGGED IN
        // ============================================
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
    <script src="js/animations.js"></script>
</body>
</html>
