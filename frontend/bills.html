<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bills - SmartBill</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="js/api.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/currency.js" defer></script>
    <style>
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 0.5rem 1.5rem;
            border: 2px solid var(--border-color);
            border-radius: 2rem;
            background: var(--card-bg);
            color: var(--muted-text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn:hover {
            border-color: var(--primary-500);
            color: var(--primary-500);
        }
        
        .filter-btn.active {
            background: var(--primary-500);
            border-color: var(--primary-500);
            color: white;
        }
        
        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 2px solid var(--border-color);
            border-radius: 2rem;
            font-size: 1rem;
            background: var(--card-bg);
            color: var(--text-color);
        }
        
        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-text);
        }
        
        .bill-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .stat-card.active {
            border-color: var(--primary-500);
            background: var(--primary-50);
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-500);
        }
        
        .stat-label {
            color: var(--muted-text);
            font-size: 0.9rem;
        }
        
        .stat-subtext {
            font-size: 0.8rem;
            color: var(--gray-400);
            margin-top: 0.25rem;
        }

        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
        
        .connection-status.online {
            background: var(--success-100);
            color: var(--success-700);
            display: block;
        }
        
        .connection-status.offline {
            background: var(--danger-100);
            color: var(--danger-700);
            display: block;
        }
        
        .debug-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary-500);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 999;
            font-size: 14px;
            box-shadow: var(--shadow-md);
        }
        
        .debug-btn:hover {
            background: var(--primary-600);
            transform: scale(1.05);
        }

        .toast-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 5px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideInRight 0.3s ease;
        }

        .toast-success {
            background: var(--success-500);
        }

        .toast-error {
            background: var(--danger-500);
        }

        .toast-info {
            background: var(--primary-500);
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            margin-left: 1rem;
        }

        .action-btn-small {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--muted-text);
        }

        .action-btn-small:hover {
            background: var(--primary-500);
            color: white;
            border-color: var(--primary-500);
            transform: scale(1.05);
        }

        .action-btn-small.delete:hover {
            background: var(--danger-500);
            border-color: var(--danger-500);
        }

        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-backdrop.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        .modal {
            background: var(--card-bg);
            border-radius: 1rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideUp 0.3s ease;
            border: 1px solid var(--border-color);
        }
        
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            z-index: 10;
        }
        
        .modal-body {
            padding: 1.5rem;
        }
        
        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            position: sticky;
            bottom: 0;
            background: var(--card-bg);
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--muted-text);
            transition: color 0.3s;
        }
        
        .close-btn:hover {
            color: var(--danger-500);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--card-bg);
            border-radius: 1rem;
            border: 2px dashed var(--border-color);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--gray-400);
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--muted-text);
            margin-bottom: 2rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--muted-text);
        }
        
        .loading i {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--primary-500);
        }

        .bill-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: var(--card-bg);
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s;
            border-left: 4px solid transparent;
            cursor: pointer;
        }

        .bill-item:hover {
            box-shadow: var(--shadow-md);
            transform: translateX(2px);
        }

        .bill-item.bill-highlight {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.28), 0 18px 36px rgba(102, 126, 234, 0.2);
            animation: billHighlightPulse 1.2s ease;
        }

        @keyframes billHighlightPulse {
            0% {
                transform: translateX(0) scale(0.99);
            }
            50% {
                transform: translateX(2px) scale(1.01);
            }
            100% {
                transform: translateX(0) scale(1);
            }
        }

        .bill-item.expanded {
            border-left-color: var(--primary-500);
            background: var(--surface-color);
        }

        .bill-icon {
            width: 40px;
            height: 40px;
            background: var(--surface-color);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            color: var(--primary-500);
        }

        .bill-info {
            flex: 1;
        }

        .bill-info h4 {
            margin-bottom: 0.25rem;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .bill-info p {
            color: var(--muted-text);
            font-size: 0.875rem;
            display: flex;
            gap: 1rem;
        }

        .bill-amount {
            font-weight: bold;
            color: var(--text-color);
            margin-right: 1rem;
        }

        .bill-status {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status-pending {
            background: var(--warning-100);
            color: var(--warning-600);
        }

        .status-partial {
            background: var(--primary-100);
            color: var(--primary-700);
        }

        .status-paid {
            background: var(--success-100);
            color: var(--success-700);
        }

        .payment-summary {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.25rem;
        }

        .payment-count {
            font-size: 0.8rem;
            color: var(--muted-text);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .payment-count i.fa-check-circle {
            color: var(--success-500);
        }

        .payment-count i.fa-clock {
            color: var(--warning-500);
        }

        .error-container {
            text-align: center;
            padding: 2rem;
            color: var(--danger-500);
            background: var(--danger-100);
            border-radius: 0.5rem;
            margin: 1rem 0;
        }

        .retry-btn {
            background: var(--primary-500);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        .retry-btn:hover {
            background: var(--primary-600);
        }

        .member-payments {
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            padding: 1rem;
            background: var(--card-bg);
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            margin-left: 60px;
        }

        .member-payments.hidden {
            display: none;
        }

        .member-payment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary-50);
        }

        .member-payment-header h4 {
            color: var(--text-color);
            font-size: 1rem;
        }

        .member-payment-header .total-paid {
            color: var(--success-500);
            font-weight: bold;
        }

        .member-payment-header .total-remaining {
            color: var(--warning-500);
            font-weight: bold;
        }

        .member-list {
            display: grid;
            gap: 0.5rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .member-payment-row {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            background: var(--surface-color);
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
        }

        .member-payment-row:hover {
            background: var(--primary-50);
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--gradient-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 0.75rem;
        }

        .member-avatar.name-only {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .member-details {
            flex: 1;
        }

        .member-name {
            font-weight: 600;
            color: var(--text-color);
        }

        .member-type {
            font-size: 0.7rem;
            color: var(--muted-text);
            margin-left: 0.5rem;
        }

        .member-amount {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .amount-input {
            width: 100px;
            padding: 0.25rem 0.5rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            text-align: right;
            background: var(--card-bg);
            color: var(--text-color);
        }

        .amount-input:focus {
            outline: none;
            border-color: var(--primary-500);
        }

        .paid-badge {
            background: var(--success-100);
            color: var(--success-700);
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .unpaid-badge {
            background: var(--danger-100);
            color: var(--danger-700);
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .payment-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--success-500);
        }

        .bulk-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .bulk-actions button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-mark-paid {
            background: var(--success-500);
            color: white;
        }

        .btn-mark-paid:hover {
            background: var(--success-600);
            transform: translateY(-2px);
        }

        .btn-mark-unpaid {
            background: var(--warning-500);
            color: white;
        }

        .btn-mark-unpaid:hover {
            background: var(--warning-600);
            transform: translateY(-2px);
        }

        .btn-save-payments {
            background: var(--primary-500);
            color: white;
        }

        .btn-save-payments:hover {
            background: var(--primary-600);
            transform: translateY(-2px);
        }

        .btn-send-reminder {
            background: var(--warning-500);
            color: white;
        }

        .btn-send-reminder:hover {
            background: var(--warning-600);
            transform: translateY(-2px);
        }

        .reminder-btn {
            border: none;
            border-radius: 2rem;
            padding: 0.35rem 0.8rem;
            background: var(--warning-100);
            color: var(--warning-700);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            font-size: 0.75rem;
        }

        .reminder-btn:hover {
            background: var(--warning-200);
            transform: scale(1.05);
        }

        .expand-icon {
            margin-left: 0.5rem;
            color: var(--primary-500);
            transition: transform 0.3s;
        }

        .expand-icon.expanded {
            transform: rotate(180deg);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            background: var(--card-bg);
            color: var(--text-color);
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes modalSlideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .bill-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .filter-bar {
                flex-direction: column;
            }
            
            .search-box {
                width: 100%;
            }
            
            .member-payments {
                margin-left: 0;
            }
            
            .member-payment-row {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            
            .member-amount {
                width: 100%;
                justify-content: flex-start;
            }
            
            .bill-item {
                flex-wrap: wrap;
            }
            
            .bill-status {
                margin-top: 0.5rem;
            }
            
            .action-buttons {
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Toast Message Container -->
    <div id="toastMessage" class="toast-message" style="display: none;"></div>

    <!-- Connection Status -->
    <div id="connectionStatus" class="connection-status"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-receipt"></i>
                <span>SmartBill</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="dashboard.html">Dashboard</a>
                <a href="groups.html">Groups</a>
                <a href="bills.html" class="active">Bills</a>
                <a href="analytics.html">Analytics</a>
                <a href="export.html">Export</a>
                <a href="alerts.html">Alerts</a>
                <a href="profile.html">Profile</a>
            </div>
            <div class="user-menu">
                <div class="currency-selector" id="currencySelector">
                    <button class="currency-btn" onclick="toggleCurrencyDropdown()">
                        <span id="selectedCurrencyFlag">🇰🇪</span>
                        <span id="selectedCurrencyCode">KES</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="currency-dropdown" id="currencyDropdown">
                        <div class="currency-dropdown-header">
                            <h4>Select Currency</h4>
                        </div>
                        <div class="currency-list" id="currencyList"></div>
                    </div>
                </div>
                <button class="dark-mode-toggle" id="darkModeToggle" title="Toggle dark mode">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="user-info">
                    <div class="user-name" id="userName">Loading...</div>
                    <div class="user-email" id="userEmail"></div>
                </div>
                <div class="user-avatar" id="userAvatar" onclick="window.location.href='profile.html'" style="cursor: pointer;" title="Your Profile">
                    <img id="navbarAvatarImage" src="" style="display: none; width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                    <span id="navbarAvatarText">U</span>
                </div>
                <button class="logout-btn" onclick="logout()" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            <button class="mobile-menu-btn" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="container">
        <!-- Page Header -->
        <div class="section-header">
            <h2><i class="fas fa-receipt"></i> My Bills</h2>
            <a href="create-bill.html" class="btn btn-primary">
                <i class="fas fa-plus"></i> New Bill
            </a>
        </div>

        <!-- Bill Stats -->
        <div class="bill-stats">
            <div class="stat-card" onclick="filterBills('all')" id="stat-all">
                <div class="stat-value" id="totalBills">0</div>
                <div class="stat-label">Total Bills</div>
                <div class="stat-subtext" id="totalAmount">KSh 0</div>
            </div>
            <div class="stat-card" onclick="filterBills('pending')" id="stat-pending">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
                <div class="stat-subtext">No payments yet</div>
            </div>
            <div class="stat-card" onclick="filterBills('partial')" id="stat-partial">
                <div class="stat-value" id="partialCount">0</div>
                <div class="stat-label">Partial</div>
                <div class="stat-subtext">Partially paid</div>
            </div>
            <div class="stat-card" onclick="filterBills('paid')" id="stat-paid">
                <div class="stat-value" id="paidCount">0</div>
                <div class="stat-label">Paid</div>
                <div class="stat-subtext">Fully settled</div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterBills('all')">All Bills</button>
                <button class="filter-btn" onclick="filterBills('pending')">Pending</button>
                <button class="filter-btn" onclick="filterBills('partial')">Partial</button>
                <button class="filter-btn" onclick="filterBills('paid')">Paid</button>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search bills by title or group..." id="searchInput" onkeyup="searchBills()">
            </div>
        </div>

        <!-- Bills List -->
        <div id="billsList">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading bills...</p>
            </div>
        </div>
    </main>

    <!-- Edit Bill Modal -->
    <div class="modal-backdrop" id="editBillModal">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> Edit Bill</h2>
                <button class="close-btn" onclick="hideEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editBillForm">
                    <div class="form-group">
                        <label for="editBillTitle">Bill Title</label>
                        <input type="text" id="editBillTitle" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="editBillAmount">Total Amount</label>
                        <input type="number" id="editBillAmount" step="0.01" min="0" class="form-control" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveBillEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Debug Button -->
    <button class="debug-btn" onclick="debugConnection()">
        <i class="fas fa-bug"></i> Debug
    </button>

    <script>
        // ============================================
        // API CONFIGURATION
        // ============================================
        const PAGE_API_BASE = typeof API_BASE !== 'undefined'
            ? API_BASE
            : (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000/api'
            : 'https://smartbill-hrcu.onrender.com/api');
        
        console.log('PAGE_API_BASE:', PAGE_API_BASE);
        
        let allBills = [];
        let currentFilter = 'all';
        let searchTerm = '';
        let currentEditingBill = null;
        let paymentStatusCache = {};
        let expandedBillId = null;

        function getRequestedBillId() {
            const params = new URLSearchParams(window.location.search);
            const billId = params.get('billId');
            return billId ? Number(billId) : null;
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.className = `toast-message toast-${type}`;
            toast.style.display = 'block';
            
            if (type === 'success' && typeof showConfetti === 'function') {
                setTimeout(() => showConfetti(800, 40), 100);
            }
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function formatCurrency(amount, currency = 'KES') {
            return new Intl.NumberFormat('en-KE', {
                style: 'currency',
                currency: currency,
                minimumFractionDigits: 2
            }).format(amount);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // AUTHENTICATION CHECK
        // ============================================
        
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        }

        // ============================================
        // USER DATA
        // ============================================
        
        function loadUserData() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('userName').textContent = user.name || 'User';
            document.getElementById('userEmail').textContent = user.email || '';
            document.getElementById('navbarAvatarText').textContent = user.name ? user.name.charAt(0).toUpperCase() : 'U';
        }

        async function loadUserAvatar() {
            try {
                const res = await fetch(`${PAGE_API_BASE}/profile`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                if (res.ok) {
                    const user = await res.json();
                    const avatarImg = document.getElementById('navbarAvatarImage');
                    const avatarText = document.getElementById('navbarAvatarText');
                    
                    if (user.avatar) {
                        avatarImg.src = user.avatar;
                        avatarImg.style.display = 'block';
                        avatarText.style.display = 'none';
                    }
                }
            } catch (error) {
                console.error('Error loading avatar:', error);
            }
        }

        // ============================================
        // SERVER CONNECTION
        // ============================================
        
        async function checkServerConnection() {
            const statusEl = document.getElementById('connectionStatus');
            
            try {
                const response = await fetch(`${PAGE_API_BASE}/health`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    statusEl.className = 'connection-status online';
                    statusEl.innerHTML = '<i class="fas fa-check-circle"></i> Connected to server';
                    setTimeout(() => {
                        statusEl.style.display = 'none';
                    }, 3000);
                } else {
                    throw new Error('Server not responding');
                }
            } catch (error) {
                statusEl.className = 'connection-status offline';
                statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Cannot connect to server';
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            }
        }

        // ============================================
        // BILL MANAGEMENT
        // ============================================
        
        async function loadBills() {
            const container = document.getElementById('billsList');
            
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = 'login.html';
                    return;
                }

                console.log('Fetching bills from:', `${PAGE_API_BASE}/bills`);
                
                const response = await fetch(`${PAGE_API_BASE}/bills`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                console.log('Response status:', response.status);

                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.clear();
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error(`Failed to load bills: ${response.status}`);
                }

                const apiBills = await response.json();
                console.log('Bills from API:', apiBills.length);
                
                allBills = apiBills.map(bill => ({ ...bill, source: 'api' }));
                const requestedBillId = getRequestedBillId();
                if (requestedBillId && allBills.some(bill => Number(bill.id) === requestedBillId)) {
                    expandedBillId = requestedBillId;
                }
                
                await loadPaymentStatusForBills();
                
                if (allBills.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-receipt"></i>
                            <h3>No Bills Found</h3>
                            <p>You haven't created any bills yet. Create your first bill to get started!</p>
                            <a href="create-bill.html" class="btn btn-primary">
                                <i class="fas fa-plus"></i> Create Bill
                            </a>
                        </div>
                    `;
                    return;
                }
                
                updateStats();
                displayBills();
                
            } catch (error) {
                console.error('Error loading bills:', error);
                container.innerHTML = `
                    <div class="error-container">
                        <i class="fas fa-exclamation-circle" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                        <h3>Error Loading Bills</h3>
                        <p>${escapeHtml(error.message)}</p>
                        <p style="margin: 1rem 0;">Please check your connection and try again.</p>
                        <button class="retry-btn" onclick="loadBills()">
                            <i class="fas fa-sync"></i> Try Again
                        </button>
                    </div>
                `;
            }
        }

        async function loadPaymentStatusForBills() {
            paymentStatusCache = {};
            
            for (const bill of allBills) {
                try {
                    const response = await fetch(`${PAGE_API_BASE}/bills/${bill.id}/payment-status`, {
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        }
                    });
                    
                    if (response.ok) {
                        const statuses = await response.json();
                        paymentStatusCache[bill.id] = statuses;
                        
                        const totalMembers = statuses.length;
                        const paidMembers = statuses.filter(s => s.paid).length;
                        
                        if (paidMembers === 0) {
                            bill.status = 'pending';
                        } else if (paidMembers === totalMembers) {
                            bill.status = 'paid';
                        } else {
                            bill.status = 'partial';
                        }
                    }
                } catch (error) {
                    console.error(`Error loading payment status for bill ${bill.id}:`, error);
                    paymentStatusCache[bill.id] = [];
                }
            }
        }

        function updateStats() {
            const total = allBills.length;
            const totalAmount = allBills.reduce((sum, bill) => sum + (parseFloat(bill.total) || 0), 0);
            
            const pending = allBills.filter(b => b.status === 'pending').length;
            const partial = allBills.filter(b => b.status === 'partial').length;
            const paid = allBills.filter(b => b.status === 'paid').length;
            
            document.getElementById('totalBills').textContent = total;
            document.getElementById('totalAmount').textContent = formatCurrency(totalAmount);
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('partialCount').textContent = partial;
            document.getElementById('paidCount').textContent = paid;
        }

        function toggleBillExpansion(billId) {
            if (expandedBillId === billId) {
                expandedBillId = null;
            } else {
                expandedBillId = billId;
            }
            displayBills();
        }

        // ============================================
        // MEMBER PAYMENT FUNCTIONS
        // ============================================
        
        async function toggleMemberPayment(billId, memberId, memberType, currentPaid) {
            const statuses = paymentStatusCache[billId] || [];
            const memberStatus = statuses.find(s => 
                (memberType === 'registered' && s.member_id === memberId) ||
                (memberType === 'name-only' && s.member_id === memberId)
            );
            
            if (!memberStatus) return;
            
            const newPaid = !currentPaid;
            const amount = memberStatus.amount;
            
            try {
                let endpoint, body;
                
                if (memberType === 'name-only') {
                    endpoint = `${PAGE_API_BASE}/name-payments`;
                    body = {
                        bill_id: billId,
                        name_member_id: memberId,
                        amount: amount,
                        method: 'cash',
                        notes: newPaid ? 'Marked as paid' : 'Marked as unpaid'
                    };
                } else {
                    if (newPaid) {
                        endpoint = `${PAGE_API_BASE}/payments`;
                        body = {
                            bill_id: billId,
                            user_id: memberId,
                            amount: amount,
                            method: 'cash',
                            notes: 'Marked as paid'
                        };
                    } else {
                        showToast('Cannot undo payment automatically. Please contact support.', 'warning');
                        return;
                    }
                }
                
                if (newPaid) {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        },
                        body: JSON.stringify(body)
                    });
                    
                    if (response.ok) {
                        showToast(`${escapeHtml(memberStatus.name)} marked as paid`, 'success');
                        await loadPaymentStatusForBills();
                        displayBills();
                        updateStats();
                    } else {
                        const error = await response.json();
                        showToast(error.error || 'Failed to update payment', 'error');
                    }
                }
            } catch (error) {
                console.error('Error updating payment:', error);
                showToast('Failed to update payment', 'error');
            }
        }

        async function updateMemberPaymentAmount(billId, memberId, memberType, newAmount) {
            const statuses = paymentStatusCache[billId] || [];
            const memberStatus = statuses.find(s => 
                (memberType === 'registered' && s.member_id === memberId) ||
                (memberType === 'name-only' && s.member_id === memberId)
            );
            
            if (!memberStatus) return;
            
            if (memberStatus.paid) {
                showToast('Cannot change amount for paid members', 'warning');
                return;
            }
            
            memberStatus.amount = parseFloat(newAmount);
            displayBills();
            showToast('Amount updated locally', 'info');
        }

        async function bulkMarkPaid(billId, memberIds, memberTypes) {
            const bill = allBills.find(b => b.id == billId);
            if (!bill) return;
            
            let successCount = 0;
            let errorCount = 0;
            
            for (let i = 0; i < memberIds.length; i++) {
                const memberId = memberIds[i];
                const memberType = memberTypes[i];
                const statuses = paymentStatusCache[billId] || [];
                const memberStatus = statuses.find(s => 
                    (memberType === 'registered' && s.member_id === memberId) ||
                    (memberType === 'name-only' && s.member_id === memberId)
                );
                
                if (!memberStatus || memberStatus.paid) continue;
                
                try {
                    let endpoint, body;
                    
                    if (memberType === 'name-only') {
                        endpoint = `${PAGE_API_BASE}/name-payments`;
                        body = {
                            bill_id: billId,
                            name_member_id: memberId,
                            amount: memberStatus.amount,
                            method: 'cash',
                            notes: 'Bulk marked as paid'
                        };
                    } else {
                        endpoint = `${PAGE_API_BASE}/payments`;
                        body = {
                            bill_id: billId,
                            user_id: memberId,
                            amount: memberStatus.amount,
                            method: 'cash',
                            notes: 'Bulk marked as paid'
                        };
                    }
                    
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        },
                        body: JSON.stringify(body)
                    });
                    
                    if (response.ok) {
                        successCount++;
                    } else {
                        errorCount++;
                    }
                } catch (error) {
                    console.error('Error in bulk payment:', error);
                    errorCount++;
                }
            }
            
            if (successCount > 0) {
                showToast(`${successCount} members marked as paid`, 'success');
                await loadPaymentStatusForBills();
                displayBills();
                updateStats();
            }
            
            if (errorCount > 0) {
                showToast(`${errorCount} members failed`, 'error');
            }
        }

        async function sendPaymentReminder(billId, userId = null, memberName = 'members') {
            try {
                const response = await fetch(`${PAGE_API_BASE}/bills/${billId}/reminders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(userId ? { user_id: userId } : {})
                });

                const data = await response.json();

                if (!response.ok) {
                    if (data.error === 'No unpaid members to remind') {
                        showToast('All members have already paid!', 'info');
                        return;
                    }
                    throw new Error(data.error || 'Failed to send reminder');
                }

                const extraNote = data.nameOnlyPending
                    ? ` ${data.nameOnlyPending} name-only member${data.nameOnlyPending === 1 ? '' : 's'} still need manual follow-up.`
                    : '';

                showToast(`${data.message}.${extraNote}`.trim(), 'success');
            } catch (error) {
                console.error('Error sending reminder:', error);
                showToast(error.message || `Failed to remind ${memberName}`, 'error');
            }
        }

        // ============================================
        // DISPLAY FUNCTIONS
        // ============================================
        
        function displayBills() {
            const container = document.getElementById('billsList');
            const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
            
            let filtered = [...allBills];
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(bill => bill.status === currentFilter);
            }
            
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(bill => 
                    (bill.title || '').toLowerCase().includes(term) ||
                    (bill.group_name || '').toLowerCase().includes(term)
                );
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-filter"></i>
                        <h3>No Bills Found</h3>
                        <p>${searchTerm ? 'No bills match your search' : 'No ' + currentFilter + ' bills found'}</p>
                        <button class="btn btn-primary" onclick="filterBills('all')">Show All Bills</button>
                    </div>
                `;
                return;
            }
            
            let html = '';
            filtered.forEach(bill => {
                const date = bill.created_at ? new Date(bill.created_at).toLocaleDateString() : 'Unknown date';
                const total = typeof bill.total === 'number' ? bill.total : parseFloat(bill.total) || 0;
                const status = bill.status || 'pending';
                const isExpanded = expandedBillId === bill.id;
                
                const statuses = paymentStatusCache[bill.id] || [];
                const paidMembers = statuses.filter(s => s.paid).length;
                const totalMembers = statuses.length;
                const paidAmount = statuses.filter(s => s.paid).reduce((sum, s) => sum + parseFloat(s.amount), 0);
                const canSendReminders = Number(currentUser.id) === Number(bill.created_by);
                
                html += `
                    <div class="bill-item ${isExpanded ? 'expanded' : ''}" data-bill-id="${bill.id}" onclick="toggleBillExpansion(${bill.id})">
                        <div class="bill-icon">
                            <i class="fas fa-receipt"></i>
                        </div>
                        <div class="bill-info">
                            <h4>
                                ${escapeHtml(bill.title || 'Untitled Bill')}
                                ${status === 'paid' ? ' <i class="fas fa-check-circle" style="color: var(--success-500);" title="Fully Paid"></i>' : ''}
                                ${status === 'partial' ? ' <i class="fas fa-adjust" style="color: var(--primary-500);" title="Partially Paid"></i>' : ''}
                                ${status === 'pending' ? ' <i class="fas fa-clock" style="color: var(--warning-500);" title="Pending"></i>' : ''}
                            </h4>
                            <p>
                                <span><i class="fas fa-users"></i> ${escapeHtml(bill.group_name || 'No Group')}</span>
                                <span><i class="far fa-calendar"></i> ${date}</span>
                            </p>
                            <div class="payment-summary">
                                <span class="payment-count">
                                    <i class="fas fa-check-circle"></i> ${paidMembers}/${totalMembers} paid
                                </span>
                                <span class="payment-count">
                                    <i class="fas fa-dollar-sign"></i> ${formatCurrency(paidAmount)} / ${formatCurrency(total)}
                                </span>
                            </div>
                        </div>
                        <div class="bill-amount">${formatCurrency(total)}</div>
                        <span class="bill-status status-${status}">
                            ${status === 'paid' ? 'Paid' : status === 'partial' ? 'Partial' : 'Pending'}
                        </span>
                        <div class="action-buttons" onclick="event.stopPropagation()">
                            <button class="action-btn-small" onclick="editBill(${bill.id}, '${escapeHtml(bill.title)}', ${total}, '${status}')" title="Edit Bill">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn-small delete" onclick="deleteBill(${bill.id})" title="Delete Bill">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        <i class="fas fa-chevron-down expand-icon ${isExpanded ? 'expanded' : ''}"></i>
                    </div>
                `;
                
                if (isExpanded && statuses.length > 0) {
                    const unpaidMembers = statuses.filter(s => !s.paid);
                    const unpaidRegisteredMembers = unpaidMembers.filter(s => s.member_type === 'registered');
                    const unpaidIds = unpaidMembers.map(s => s.member_id);
                    const unpaidTypes = unpaidMembers.map(s => s.member_type);
                    
                    html += `
                        <div class="member-payments">
                            <div class="member-payment-header">
                                <h4><i class="fas fa-users"></i> Member Payments</h4>
                                <div>
                                    <span class="total-paid">Paid: ${formatCurrency(paidAmount)}</span>
                                    <span class="total-remaining"> | Remaining: ${formatCurrency(total - paidAmount)}</span>
                                </div>
                            </div>
                            
                            <div class="member-list">
                                ${statuses.map(member => {
                                    const isPaid = member.paid;
                                    const avatarLetter = member.name ? member.name.charAt(0).toUpperCase() : '?';
                                    const memberAmount = typeof member.amount === 'number'
                                        ? member.amount
                                        : parseFloat(member.amount) || 0;
                                    
                                    return `
                                        <div class="member-payment-row">
                                            <div class="member-avatar ${member.member_type === 'name-only' ? 'name-only' : ''}">
                                                ${avatarLetter}
                                            </div>
                                            <div class="member-details">
                                                <span class="member-name">${escapeHtml(member.name)}</span>
                                                <span class="member-type">${member.member_type === 'name-only' ? 'Name Only' : 'Registered'}</span>
                                            </div>
                                            <div class="member-amount">
                                                <span style="color: var(--primary-500); font-weight: bold;">$</span>
                                                <input type="number" class="amount-input" value="${memberAmount.toFixed(2)}" 
                                                    step="0.01" min="0" 
                                                    ${isPaid ? 'disabled' : ''}
                                                    onchange="updateMemberPaymentAmount(${bill.id}, ${member.member_id}, '${member.member_type}', this.value)">
                                                ${isPaid ? 
                                                    '<span class="paid-badge"><i class="fas fa-check-circle"></i> Paid</span>' : 
                                                    '<span class="unpaid-badge"><i class="fas fa-clock"></i> Unpaid</span>'
                                                }
                                                <input type="checkbox" class="payment-checkbox" 
                                                    ${isPaid ? 'checked' : ''}
                                                    onchange="toggleMemberPayment(${bill.id}, ${member.member_id}, '${member.member_type}', ${isPaid})">
                                                ${canSendReminders && !isPaid && member.member_type === 'registered' ? `
                                                    <button class="reminder-btn" onclick="event.stopPropagation(); sendPaymentReminder(${bill.id}, ${member.member_id}, '${escapeHtml(member.name).replace(/'/g, "\\'")}')">
                                                        <i class="fas fa-bell"></i> Remind
                                                    </button>
                                                ` : ''}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                            
                            ${unpaidMembers.length > 0 ? `
                                <div class="bulk-actions">
                                    <button class="btn-mark-paid" onclick="bulkMarkPaid(${bill.id}, [${unpaidIds.join(',')}], ['${unpaidTypes.join("','")}'])">
                                        <i class="fas fa-check-circle"></i> Mark All Unpaid as Paid
                                    </button>
                                    ${canSendReminders && unpaidRegisteredMembers.length > 0 ? `
                                        <button class="btn-send-reminder" onclick="event.stopPropagation(); sendPaymentReminder(${bill.id})">
                                            <i class="fas fa-bell"></i> Remind Unpaid Members
                                        </button>
                                    ` : ''}
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
            });
            
            container.innerHTML = html;

            const requestedBillId = getRequestedBillId();
            if (requestedBillId && expandedBillId === requestedBillId) {
                const highlightedBill = container.querySelector(`.bill-item[data-bill-id="${requestedBillId}"]`);
                if (highlightedBill) {
                    highlightedBill.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    highlightedBill.classList.add('bill-highlight');
                    setTimeout(() => highlightedBill.classList.remove('bill-highlight'), 1800);
                }
            }
        }

        // ============================================
        // BILL ACTIONS
        // ============================================
        
        function editBill(billId, currentTitle, currentTotal, currentStatus) {
            const bill = allBills.find(b => b.id == billId);
            if (bill) {
                currentEditingBill = bill;
                document.getElementById('editBillTitle').value = currentTitle;
                document.getElementById('editBillAmount').value = currentTotal;
                document.getElementById('editBillModal').classList.add('show');
            }
            event.stopPropagation();
        }

        async function saveBillEdit() {
            if (!currentEditingBill) return;
            
            const title = document.getElementById('editBillTitle').value.trim();
            const amount = parseFloat(document.getElementById('editBillAmount').value);
            
            if (!title || !amount) {
                showToast('Please fill in all fields', 'error');
                return;
            }
            
            const saveBtn = document.querySelector('#editBillModal .btn-primary');
            const originalText = saveBtn.innerHTML;
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            
            try {
                console.log('Updating bill:', currentEditingBill.id, { title, amount });
                
                const res = await fetch(`${PAGE_API_BASE}/bills/${currentEditingBill.id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ title, total: amount })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showToast('Bill updated successfully', 'success');
                    
                    const billIndex = allBills.findIndex(b => b.id == currentEditingBill.id);
                    if (billIndex !== -1) {
                        allBills[billIndex] = { ...allBills[billIndex], title, total: amount };
                    }
                    
                    hideEditModal();
                    await loadPaymentStatusForBills();
                    displayBills();
                    updateStats();
                } else {
                    showToast(data.error || 'Failed to update bill', 'error');
                }
            } catch (error) {
                console.error('Error updating bill:', error);
                showToast('Failed to update bill. Please try again.', 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
            }
        }

        function hideEditModal() {
            document.getElementById('editBillModal').classList.remove('show');
            currentEditingBill = null;
        }

        async function deleteBill(billId) {
            if (!confirm('Are you sure you want to delete this bill? This action cannot be undone.')) return;
            
            const deleteBtn = event.target.closest('button');
            const originalText = deleteBtn.innerHTML;
            deleteBtn.disabled = true;
            deleteBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            event.stopPropagation();
            
            try {
                const res = await fetch(`${PAGE_API_BASE}/bills/${billId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                if (res.ok) {
                    showToast('Bill deleted successfully', 'success');
                    allBills = allBills.filter(b => b.id != billId);
                    delete paymentStatusCache[billId];
                    displayBills();
                    updateStats();
                } else {
                    const data = await res.json();
                    showToast(data.error || 'Failed to delete bill', 'error');
                }
            } catch (error) {
                console.error('Error deleting bill:', error);
                showToast('Failed to delete bill. Please try again.', 'error');
            } finally {
                deleteBtn.disabled = false;
                deleteBtn.innerHTML = originalText;
            }
        }

        // ============================================
        // FILTERS & SEARCH
        // ============================================
        
        function filterBills(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if ((filter === 'all' && btn.textContent.includes('All')) ||
                    (filter === 'pending' && btn.textContent.includes('Pending')) ||
                    (filter === 'partial' && btn.textContent.includes('Partial')) ||
                    (filter === 'paid' && btn.textContent.includes('Paid'))) {
                    btn.classList.add('active');
                }
            });
            
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('active');
            });
            const statMap = { all: 'stat-all', pending: 'stat-pending', partial: 'stat-partial', paid: 'stat-paid' };
            const statId = statMap[filter];
            if (statId) document.getElementById(statId).classList.add('active');
            
            displayBills();
        }

        function searchBills() {
            searchTerm = document.getElementById('searchInput').value;
            displayBills();
        }

        // ============================================
        // NAVIGATION
        // ============================================
        
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // ============================================
        // DEBUG
        // ============================================
        
        async function debugConnection() {
            console.group('🔍 DEBUG INFORMATION');
            console.log('Browser Info:', {
                url: window.location.href,
                userAgent: navigator.userAgent
            });
            console.log('Storage:', {
                token: localStorage.getItem('token') ? 'Present' : 'Missing',
                user: JSON.parse(localStorage.getItem('user') || '{}')
            });
            console.log('PAGE_API_BASE:', PAGE_API_BASE);
            console.log('Bills:', allBills.length);
            console.log('Payment Status Cache:', paymentStatusCache);
            console.groupEnd();
            showToast('Debug info logged to console (F12)', 'info');
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        
        document.addEventListener('DOMContentLoaded', function() {
            checkServerConnection();
            loadUserData();
            loadUserAvatar();
            loadBills();
            
            document.getElementById('stat-all').classList.add('active');
        });
    </script>
    <script src="js/animations.js"></script>
</body>
</html>
