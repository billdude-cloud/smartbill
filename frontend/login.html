<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Login - SmartBill</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/mobile.css">
    <script src="js/api.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo a {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 40px;
            color: #667eea;
        }

        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            color: #1f2937;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.3s;
            -webkit-appearance: none;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 18px;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }

        .forgot-link {
            text-align: right;
            margin-top: 12px;
        }

        .forgot-link a {
            color: #9ca3af;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-link a:hover {
            color: #667eea;
        }

        .signup-link {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .signup-link p {
            color: #6b7280;
            font-size: 14px;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 24px;
            display: none;
            font-size: 14px;
            text-align: center;
            border-left: 4px solid #dc2626;
        }

        .social-login {
            margin-top: 24px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: #9ca3af;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
        }

        .divider span {
            padding: 0 12px;
            font-weight: 500;
        }

        .social-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            background: white;
            color: #374151;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
        }

        .social-btn:hover {
            border-color: #667eea;
            background: #f9fafb;
            transform: translateY(-1px);
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast message */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            max-width: 400px;
            margin: 0 auto;
            background: #1f2937;
            color: white;
            padding: 14px 20px;
            border-radius: 16px;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            font-size: 14px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease;
        }

        .toast.success {
            background: #10b981;
        }

        .toast.error {
            background: #ef4444;
        }

        .toast.info {
            background: #3b82f6;
        }

        .toast.show {
            display: flex;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            .login-card {
                background: rgba(31, 41, 55, 0.95);
            }
            
            h2, .logo h1 {
                color: #f3f4f6;
            }
            
            .subtitle {
                color: #9ca3af;
            }
            
            input {
                background: #1f2937;
                border-color: #374151;
                color: #f3f4f6;
            }
            
            .divider {
                color: #6b7280;
            }
            
            .divider::before,
            .divider::after {
                border-color: #374151;
            }
            
            .social-btn {
                background: #1f2937;
                border-color: #374151;
                color: #f3f4f6;
            }
            
            .social-btn:hover {
                background: #374151;
                border-color: #667eea;
            }
            
            .signup-link {
                border-top-color: #374151;
            }
        }

        /* Mobile optimizations */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
            
            h2 {
                font-size: 24px;
            }
            
            .logo i {
                font-size: 32px;
            }
            
            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="particles"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <a href="index.html">
                    <i class="fas fa-receipt"></i>
                    <h1>SmartBill</h1>
                </a>
            </div>

            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to manage your shared expenses</p>

            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Email address" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="forgot-link">
                    <a href="forgot-password.html">Forgot password?</a>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Sign In</span>
                </button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="social-login">
                <button class="social-btn" id="googleLoginBtn">
                    <i class="fab fa-google"></i>
                    Continue with Google
                </button>
            </div>

            <div class="signup-link">
                <p>Don't have an account? <a href="signup.html">Create account</a></p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Create animated background particles
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 60 + 20;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 20}s`;
                particle.style.animationDuration = `${Math.random() * 15 + 10}s`;
                particle.style.opacity = Math.random() * 0.3;
                container.appendChild(particle);
            }
        }
        createParticles();

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const password = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Toast notification function
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Login form handler using SmartBillAPI
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const originalBtnText = loginBtn.innerHTML;
            
            // Clear previous error
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            
            // Validate inputs
            if (!email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Email format validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorDiv.textContent = 'Please enter a valid email address';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Password minimum length
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';
            
            try {
                // Use SmartBillAPI from api.js if available, otherwise fallback to fetch
                if (typeof SmartBillAPI !== 'undefined' && SmartBillAPI.login) {
                    const result = await SmartBillAPI.login(email, password);
                    
                    if (result.success) {
                        showToast('Login successful! Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    } else {
                        if (result.status === 403 && result.data?.needsVerification) {
                            showToast('Please verify your email first. Redirecting...', 'info');
                            setTimeout(() => {
                                window.location.href = `verify-email.html?email=${encodeURIComponent(result.data.email || email)}`;
                            }, 600);
                            return;
                        }
                        errorDiv.textContent = result.error || 'Invalid email or password';
                        errorDiv.style.display = 'block';
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = originalBtnText;
                    }
                } else {
                    // Fallback to direct fetch if api.js not loaded
                    const response = await fetch(`${SmartBillAPI?.API_BASE || 'http://localhost:5000/api'}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        showToast('Login successful! Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    } else {
                        if (response.status === 403 && data.needsVerification) {
                            showToast('Please verify your email first. Redirecting...', 'info');
                            setTimeout(() => {
                                window.location.href = `verify-email.html?email=${encodeURIComponent(data.email || email)}`;
                            }, 600);
                            return;
                        }
                        errorDiv.textContent = data.error || 'Invalid email or password';
                        errorDiv.style.display = 'block';
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = originalBtnText;
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = 'Unable to connect to server. Please check if the backend is running.';
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalBtnText;
            }
        });

        // Google login placeholder
        document.getElementById('googleLoginBtn').addEventListener('click', () => {
            showToast('Google login coming soon!', 'info');
        });

        // Check if already logged in
        if (typeof SmartBillAPI !== 'undefined' && SmartBillAPI.isAuthenticated && SmartBillAPI.isAuthenticated()) {
            const user = SmartBillAPI.getCurrentUser();
            console.log('🔐 Already logged in as:', user?.name);
            window.location.href = 'dashboard.html';
        } else if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }

        // Clear error on input
        document.getElementById('email').addEventListener('input', () => {
            document.getElementById('errorMessage').style.display = 'none';
        });
        document.getElementById('password').addEventListener('input', () => {
            document.getElementById('errorMessage').style.display = 'none';
        });
    </script>
</body>
</html>
