<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Reset Password - SmartBill</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="apple-touch-icon" href="logo.svg">
    <script src="js/api.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/currency.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .reset-container {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
        }

        .reset-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid var(--border-color);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo i {
            font-size: 40px;
            color: #667eea;
        }

        .logo span {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: var(--muted-text);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.3s;
            -webkit-appearance: none;
            background: var(--card-bg);
            color: var(--text-color);
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 18px;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .password-strength {
            margin-top: 8px;
        }

        .strength-bar-container {
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s, background 0.3s;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 6px;
            color: var(--muted-text);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .password-requirements {
            margin-top: 8px;
            font-size: 11px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--muted-text);
        }

        .requirement.valid {
            color: #10b981;
        }

        .reset-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }

        .reset-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: var(--danger-100);
            border-left: 4px solid var(--danger-500);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: var(--danger-700);
            display: none;
            font-size: 14px;
            align-items: center;
            gap: 10px;
        }

        .error-message.show {
            display: flex;
        }

        .error-message i {
            font-size: 18px;
        }

        .success-message {
            background: var(--success-100);
            border-left: 4px solid var(--success-500);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            color: var(--success-700);
            display: none;
            align-items: flex-start;
            gap: 12px;
        }

        .success-message.show {
            display: flex;
        }

        .success-message i {
            font-size: 20px;
            margin-top: 2px;
        }

        .success-message strong {
            display: block;
            margin-bottom: 4px;
        }

        .back-to-login {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .back-to-login a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: gap 0.3s;
        }

        .back-to-login a:hover {
            gap: 10px;
            text-decoration: underline;
        }

        .toast-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideInRight 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .toast-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .toast-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .toast-info {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Dark mode adjustments */
        body.dark-mode .reset-card {
            background: var(--card-bg);
        }

        @media (max-width: 480px) {
            .reset-card {
                padding: 32px 24px;
            }

            .logo i {
                font-size: 32px;
            }

            .logo span {
                font-size: 24px;
            }

            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="particles"></div>

    <!-- Toast Message Container -->
    <div id="toastMessage" class="toast-message" style="display: none;"></div>

    <div class="reset-container">
        <div class="reset-card">
            <div class="logo">
                <a href="index.html">
                    <i class="fas fa-receipt"></i>
                    <span>SmartBill</span>
                </a>
            </div>

            <h2>Set New Password</h2>
            <p class="subtitle">Enter your new password below</p>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Error message</span>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="success-message">
                <i class="fas fa-check-circle"></i>
                <div>
                    <strong>Password reset successful!</strong>
                    <p>Redirecting to login...</p>
                </div>
            </div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPassword" placeholder="New password" required autocomplete="new-password">
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar-container">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText">
                            <i class="fas fa-shield-alt"></i>
                            <span>Enter a password</span>
                        </div>
                    </div>
                    <div class="password-requirements" id="passwordRequirements">
                        <div class="requirement" id="reqLength">
                            <i class="fas fa-circle"></i>
                            <span>At least 6 characters</span>
                        </div>
                        <div class="requirement" id="reqLower">
                            <i class="fas fa-circle"></i>
                            <span>Lowercase letter</span>
                        </div>
                        <div class="requirement" id="reqUpper">
                            <i class="fas fa-circle"></i>
                            <span>Uppercase letter</span>
                        </div>
                        <div class="requirement" id="reqNumber">
                            <i class="fas fa-circle"></i>
                            <span>Number</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required autocomplete="off">
                        <button type="button" class="password-toggle" id="toggleConfirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="reset-btn" id="resetBtn">
                    <i class="fas fa-key"></i>
                    <span>Reset Password</span>
                </button>
            </form>

            <div class="back-to-login">
                <a href="login.html">
                    <i class="fas fa-arrow-left"></i>
                    Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // API CONFIGURATION
        // ============================================
        const PAGE_API_BASE = typeof API_BASE !== 'undefined'
            ? API_BASE
            : (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000/api'
            : 'https://smartbill-hrcu.onrender.com/api');
        
        console.log('ðŸ”§ PAGE_API_BASE:', PAGE_API_BASE);

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        // ============================================
        // CREATE BACKGROUND PARTICLES
        // ============================================
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 25;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 50 + 15;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 20}s`;
                particle.style.animationDuration = `${Math.random() * 15 + 10}s`;
                particle.style.opacity = Math.random() * 0.3;
                container.appendChild(particle);
            }
        }
        createParticles();

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.className = `toast-message toast-${type}`;
            toast.style.display = 'block';
            
            if (type === 'success' && typeof showConfetti === 'function') {
                setTimeout(() => showConfetti(600, 30), 100);
            }
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function updateRequirements(password) {
            const reqLength = document.getElementById('reqLength');
            const reqLower = document.getElementById('reqLower');
            const reqUpper = document.getElementById('reqUpper');
            const reqNumber = document.getElementById('reqNumber');
            
            const hasLength = password.length >= 6;
            const hasLower = /[a-z]/.test(password);
            const hasUpper = /[A-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            
            reqLength.className = `requirement ${hasLength ? 'valid' : ''}`;
            reqLength.querySelector('i').className = hasLength ? 'fas fa-check-circle' : 'fas fa-circle';
            
            reqLower.className = `requirement ${hasLower ? 'valid' : ''}`;
            reqLower.querySelector('i').className = hasLower ? 'fas fa-check-circle' : 'fas fa-circle';
            
            reqUpper.className = `requirement ${hasUpper ? 'valid' : ''}`;
            reqUpper.querySelector('i').className = hasUpper ? 'fas fa-check-circle' : 'fas fa-circle';
            
            reqNumber.className = `requirement ${hasNumber ? 'valid' : ''}`;
            reqNumber.querySelector('i').className = hasNumber ? 'fas fa-check-circle' : 'fas fa-circle';
        }

        // ============================================
        // PASSWORD STRENGTH CHECKER
        // ============================================
        document.getElementById('newPassword').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            updateRequirements(password);
            
            let strength = 0;
            if (password.length >= 6) strength += 20;
            if (password.length >= 8) strength += 10;
            if (/[a-z]/.test(password)) strength += 20;
            if (/[A-Z]/.test(password)) strength += 20;
            if (/[0-9]/.test(password)) strength += 20;
            if (/[$@#&!]/.test(password)) strength += 10;
            
            strengthBar.style.width = Math.min(strength, 100) + '%';
            
            if (strength <= 20) {
                strengthBar.style.background = '#ef4444';
                strengthText.innerHTML = '<i class="fas fa-shield-alt"></i> <span>Weak password</span>';
            } else if (strength <= 50) {
                strengthBar.style.background = '#f59e0b';
                strengthText.innerHTML = '<i class="fas fa-shield-alt"></i> <span>Fair password</span>';
            } else if (strength <= 80) {
                strengthBar.style.background = '#3b82f6';
                strengthText.innerHTML = '<i class="fas fa-shield-alt"></i> <span>Good password</span>';
            } else {
                strengthBar.style.background = '#10b981';
                strengthText.innerHTML = '<i class="fas fa-shield-alt"></i> <span>Strong password</span>';
            }
        });

        // ============================================
        // TOGGLE PASSWORD VISIBILITY
        // ============================================
        document.getElementById('togglePassword').addEventListener('click', function() {
            const password = document.getElementById('newPassword');
            const icon = this.querySelector('i');
            
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const password = document.getElementById('confirmPassword');
            const icon = this.querySelector('i');
            
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // ============================================
        // FORM SUBMISSION
        // ============================================
        document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successDiv = document.getElementById('successMessage');
            const originalBtnText = resetBtn.innerHTML;
            
            // Hide previous messages
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            
            // Validate token
            if (!token) {
                errorText.textContent = 'Invalid or missing reset token. Please request a new password reset.';
                errorDiv.classList.add('show');
                return;
            }
            
            // Validate passwords
            if (!newPassword || !confirmPassword) {
                errorText.textContent = 'Please fill in all fields';
                errorDiv.classList.add('show');
                return;
            }
            
            if (newPassword.length < 6) {
                errorText.textContent = 'Password must be at least 6 characters';
                errorDiv.classList.add('show');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                errorText.textContent = 'Passwords do not match';
                errorDiv.classList.add('show');
                return;
            }
            
            // Show loading state
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="spinner"></span> Resetting...';
            
            try {
                console.log('ðŸ“¡ Sending password reset request to:', `${PAGE_API_BASE}/reset-password`);
                
                const response = await fetch(`${PAGE_API_BASE}/reset-password`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await response.json();
                console.log('ðŸ“¥ Response:', { status: response.status, data });

                if (response.ok) {
                    successDiv.classList.add('show');
                    showToast('âœ… Password reset successful! Redirecting to login...', 'success');
                    
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    errorText.textContent = data.error || 'Invalid or expired reset link. Please request a new one.';
                    errorDiv.classList.add('show');
                    showToast(data.error || 'Failed to reset password', 'error');
                }
                
            } catch (error) {
                console.error('âŒ Error:', error);
                errorText.textContent = 'Network error. Please try again.';
                errorDiv.classList.add('show');
                showToast('Failed to reset password. Please check your connection.', 'error');
            } finally {
                resetBtn.disabled = false;
                resetBtn.innerHTML = originalBtnText;
            }
        });

        // ============================================
        // CHECK TOKEN ON PAGE LOAD
        // ============================================
        if (!token) {
            document.getElementById('errorText').textContent = 'Invalid or expired reset link. Please request a new password reset.';
            document.getElementById('errorMessage').classList.add('show');
        }

        // ============================================
        // CHECK IF ALREADY LOGGED IN
        // ============================================
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
    <script src="js/animations.js"></script>
</body>
</html>
