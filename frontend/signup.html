<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Sign Up - SmartBill</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/mobile.css">
    <script src="js/api.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .signup-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo a {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 40px;
            color: #667eea;
        }

        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            color: #1f2937;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.3s;
            -webkit-appearance: none;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 18px;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }

        .signup-btn:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .login-link p {
            color: #6b7280;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 24px;
            display: none;
            font-size: 14px;
            text-align: center;
            border-left: 4px solid #dc2626;
        }

        .password-strength {
            margin-top: 8px;
        }

        .strength-bar-container {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s, background 0.3s;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 6px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .strength-text i {
            font-size: 12px;
        }

        /* Password requirements list */
        .password-requirements {
            margin-top: 8px;
            font-size: 11px;
            color: #9ca3af;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .requirement i {
            font-size: 10px;
        }

        .requirement.valid {
            color: #10b981;
        }

        .requirement.invalid {
            color: #9ca3af;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            max-width: 400px;
            margin: 0 auto;
            background: #1f2937;
            color: white;
            padding: 14px 20px;
            border-radius: 16px;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            font-size: 14px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease;
        }

        .toast.success {
            background: #10b981;
        }

        .toast.error {
            background: #ef4444;
        }

        .toast.info {
            background: #3b82f6;
        }

        .toast.show {
            display: flex;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            .signup-card {
                background: rgba(31, 41, 55, 0.95);
            }
            
            h2, .logo h1 {
                color: #f3f4f6;
            }
            
            .subtitle {
                color: #9ca3af;
            }
            
            input {
                background: #1f2937;
                border-color: #374151;
                color: #f3f4f6;
            }
            
            .strength-bar-container {
                background: #374151;
            }
            
            .login-link {
                border-top-color: #374151;
            }
        }

        /* Mobile optimizations */
        @media (max-width: 480px) {
            .signup-card {
                padding: 32px 24px;
            }
            
            h2 {
                font-size: 24px;
            }
            
            .logo i {
                font-size: 32px;
            }
            
            .logo h1 {
                font-size: 24px;
            }
            
            .password-requirements {
                flex-direction: column;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="particles"></div>

    <div class="signup-container">
        <div class="signup-card">
            <div class="logo">
                <a href="index.html">
                    <i class="fas fa-receipt"></i>
                    <h1>SmartBill</h1>
                </a>
            </div>

            <h2>Create Account</h2>
            <p class="subtitle">Join thousands of happy users splitting bills effortlessly</p>

            <div id="errorMessage" class="error-message"></div>

            <form id="signupForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" placeholder="Full name" required autocomplete="name">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Email address" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Password" required autocomplete="new-password">
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar-container">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText">
                            <i class="fas fa-shield-alt"></i>
                            <span>Enter a strong password</span>
                        </div>
                        <div class="password-requirements" id="passwordRequirements">
                            <div class="requirement" id="reqLength">
                                <i class="fas fa-circle"></i>
                                <span>At least 6 characters</span>
                            </div>
                            <div class="requirement" id="reqLower">
                                <i class="fas fa-circle"></i>
                                <span>Lowercase letter</span>
                            </div>
                            <div class="requirement" id="reqUpper">
                                <i class="fas fa-circle"></i>
                                <span>Uppercase letter</span>
                            </div>
                            <div class="requirement" id="reqNumber">
                                <i class="fas fa-circle"></i>
                                <span>Number</span>
                            </div>
                        </div>
                    </div>
                </div>
                <button type="submit" class="signup-btn" id="signupBtn">
                    <i class="fas fa-user-plus"></i>
                    <span>Create Account</span>
                </button>
            </form>

            <div class="login-link">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Create animated background particles
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 60 + 20;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 20}s`;
                particle.style.animationDuration = `${Math.random() * 15 + 10}s`;
                particle.style.opacity = Math.random() * 0.3;
                container.appendChild(particle);
            }
        }
        createParticles();

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const password = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Update password requirements
        function updateRequirements(password) {
            const reqLength = document.getElementById('reqLength');
            const reqLower = document.getElementById('reqLower');
            const reqUpper = document.getElementById('reqUpper');
            const reqNumber = document.getElementById('reqNumber');
            
            const hasLength = password.length >= 6;
            const hasLower = /[a-z]/.test(password);
            const hasUpper = /[A-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            
            reqLength.className = `requirement ${hasLength ? 'valid' : 'invalid'}`;
            reqLength.querySelector('i').className = `fas ${hasLength ? 'fa-check-circle' : 'fa-circle'}`;
            
            reqLower.className = `requirement ${hasLower ? 'valid' : 'invalid'}`;
            reqLower.querySelector('i').className = `fas ${hasLower ? 'fa-check-circle' : 'fa-circle'}`;
            
            reqUpper.className = `requirement ${hasUpper ? 'valid' : 'invalid'}`;
            reqUpper.querySelector('i').className = `fas ${hasUpper ? 'fa-check-circle' : 'fa-circle'}`;
            
            reqNumber.className = `requirement ${hasNumber ? 'valid' : 'invalid'}`;
            reqNumber.querySelector('i').className = `fas ${hasNumber ? 'fa-check-circle' : 'fa-circle'}`;
        }

        // Password strength checker with requirements
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            updateRequirements(password);
            
            let strength = 0;
            if (password.length >= 6) strength += 20;
            if (password.length >= 8) strength += 10;
            if (/[a-z]/.test(password)) strength += 20;
            if (/[A-Z]/.test(password)) strength += 20;
            if (/[0-9]/.test(password)) strength += 20;
            if (/[$@#&!]/.test(password)) strength += 10;
            
            strengthBar.style.width = Math.min(strength, 100) + '%';
            
            if (strength <= 20) {
                strengthBar.style.background = '#ef4444';
                strengthText.innerHTML = '<i class="fas fa-shield-alt"></i> <span>Weak password - add more characters</span>';
            } else if (strength <= 50) {
                strengthBar.style.background = '#f59e0b';
                strengthText.innerHTML = '<i class="fas fa-shield-alt"></i> <span>Fair password - add numbers and symbols</span>';
            } else if (strength <= 80) {
                strengthBar.style.background = '#3b82f6';
                strengthText.innerHTML = '<i class="fas fa-shield-alt"></i> <span>Good password - almost there!</span>';
            } else {
                strengthBar.style.background = '#10b981';
                strengthText.innerHTML = '<i class="fas fa-shield-alt"></i> <span>Strong password - looks great!</span>';
            }
        });

        // Toast notification function
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Signup form handler using SmartBillAPI
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const signupBtn = document.getElementById('signupBtn');
            const originalBtnText = signupBtn.innerHTML;
            
            // Clear previous error
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            
            // Validate inputs
            if (!name || !email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Name validation (at least 2 characters)
            if (name.length < 2) {
                errorDiv.textContent = 'Please enter your full name (at least 2 characters)';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Email format validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorDiv.textContent = 'Please enter a valid email address';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Password validation
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Show loading state
            signupBtn.disabled = true;
            signupBtn.innerHTML = '<span class="spinner"></span> Creating account...';
            
            try {
                // Use SmartBillAPI from api.js if available
                if (typeof SmartBillAPI !== 'undefined' && SmartBillAPI.register) {
                    const result = await SmartBillAPI.register(name, email, password);
                    
                    if (result.success) {
                        showToast('Account created successfully! Redirecting to dashboard...', 'success');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    } else {
                        if (result.error === 'Email already exists') {
                            errorDiv.innerHTML = 'This email is already registered. <a href="login.html" style="color: #dc2626; text-decoration: underline;">Login instead</a>';
                            errorDiv.style.display = 'block';
                        } else {
                            errorDiv.textContent = result.error || 'Registration failed. Please try again.';
                            errorDiv.style.display = 'block';
                        }
                        signupBtn.disabled = false;
                        signupBtn.innerHTML = originalBtnText;
                    }
                } else {
                    // Fallback to direct fetch
                    const response = await fetch(`${SmartBillAPI?.API_BASE || 'http://localhost:5000/api'}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        showToast('Account created successfully! Redirecting to dashboard...', 'success');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    } else {
                        if (data.error === 'Email already exists') {
                            errorDiv.innerHTML = 'This email is already registered. <a href="login.html" style="color: #dc2626; text-decoration: underline;">Login instead</a>';
                            errorDiv.style.display = 'block';
                        } else {
                            errorDiv.textContent = data.error || 'Registration failed. Please try again.';
                            errorDiv.style.display = 'block';
                        }
                        signupBtn.disabled = false;
                        signupBtn.innerHTML = originalBtnText;
                    }
                }
            } catch (error) {
                console.error('Signup error:', error);
                errorDiv.textContent = 'Unable to connect to server. Please check if the backend is running.';
                errorDiv.style.display = 'block';
                signupBtn.disabled = false;
                signupBtn.innerHTML = originalBtnText;
            }
        });

        // Clear error on input
        document.getElementById('name').addEventListener('input', () => {
            document.getElementById('errorMessage').style.display = 'none';
        });
        document.getElementById('email').addEventListener('input', () => {
            document.getElementById('errorMessage').style.display = 'none';
        });
        document.getElementById('password').addEventListener('input', () => {
            document.getElementById('errorMessage').style.display = 'none';
        });

        // Check if already logged in
        if (typeof SmartBillAPI !== 'undefined' && SmartBillAPI.isAuthenticated && SmartBillAPI.isAuthenticated()) {
            const user = SmartBillAPI.getCurrentUser();
            console.log('ðŸ” Already logged in as:', user?.name);
            window.location.href = 'dashboard.html';
        } else if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
